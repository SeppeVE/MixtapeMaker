<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cassette</title>
<style>
  @keyframes reel-spin { to { transform: rotate(360deg); } }
  @keyframes tape-loop {
    0%   { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -120; }
  }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes float-up {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
  }
  .reel { animation: reel-spin 2.4s linear infinite; transform-origin: center; }
  .tape-line { animation: tape-loop 1.2s linear infinite; }
  .cassette-float { animation: float-up 3s ease-in-out infinite; }
  .cursor::after { content:'_'; animation: blink 1s step-end infinite; }
</style>
</head>
<body style="margin:0;padding:0;height:100vh;overflow:hidden;">
<div id="root" style="height:100%;"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="scherzo-primitives.jsx"></script>

<script type="text/babel">
const { useState } = React;
const T = SchTokens;
const F = SchFonts;

// ─── Big hero cassette ────────────────────────────────────────
function HeroCassette() {
  const W = 300, H = 195;
  const ink = T.ink;
  const body = T.paper;
  const label = T.plum;
  const reel = T.mustard;

  return (
    <div className="cassette-float">
      <svg width={W} height={H} viewBox="0 0 300 195" fill="none" xmlns="http://www.w3.org/2000/svg"
        style={{ filter: `drop-shadow(6px 6px 0 ${ink})` }}>
        {/* body */}
        <rect x="2" y="2" width="296" height="191" rx="10" fill={body} stroke={ink} strokeWidth="3.5"/>
        {/* beveled inset */}
        <rect x="10" y="10" width="280" height="175" rx="6" fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="1"/>
        {/* label area */}
        <rect x="14" y="14" width="272" height="88" rx="4" fill={label} stroke={ink} strokeWidth="2.5"/>
        {/* label inner frame */}
        <rect x="20" y="20" width="260" height="76" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5"/>
        {/* label lines */}
        <rect x="26" y="28" width="130" height="6" rx="2" fill="rgba(255,255,255,0.55)"/>
        <rect x="26" y="42" width="90" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
        <rect x="26" y="54" width="60" height="3" rx="2" fill="rgba(255,255,255,0.2)"/>
        <rect x="26" y="64" width="110" height="3" rx="2" fill="rgba(255,255,255,0.15)"/>
        <rect x="26" y="74" width="75" height="3" rx="2" fill="rgba(255,255,255,0.15)"/>
        {/* SIDE A badge */}
        <rect x="210" y="26" width="64" height="22" rx="2" fill={T.mustard} stroke={ink} strokeWidth="2"/>
        <text x="242" y="41" textAnchor="middle" fontFamily="monospace" fontSize="11" fontWeight="bold" fill={ink}>SIDE A</text>
        {/* cassette window area */}
        <rect x="14" y="112" width="272" height="70" rx="4" fill={ink} stroke={ink} strokeWidth="2"/>
        {/* window cutout */}
        <rect x="80" y="118" width="140" height="58" rx="4" fill="#1a1218" stroke={T.inkSoft} strokeWidth="1.5"/>
        {/* tape path */}
        <path d="M 90 158 Q 150 138 210 158" stroke="#3a2a38" strokeWidth="3" fill="none"
          strokeDasharray="6 4" className="tape-line"/>
        {/* left reel group */}
        <g transform="translate(44 148)" className="reel">
          <circle r="26" fill={T.paperDk} stroke={ink} strokeWidth="2.5"/>
          <circle r="10" fill={reel} stroke={ink} strokeWidth="2"/>
          <line x1="0" y1="-24" x2="0" y2="24" stroke={ink} strokeWidth="2"/>
          <line x1="-24" y1="0" x2="24" y2="0" stroke={ink} strokeWidth="2"/>
          <line x1="-17" y1="-17" x2="17" y2="17" stroke={ink} strokeWidth="2"/>
          <line x1="17" y1="-17" x2="-17" y2="17" stroke={ink} strokeWidth="2"/>
          <circle r="4" fill={T.plum} stroke={ink} strokeWidth="1.5"/>
        </g>
        {/* right reel group */}
        <g transform="translate(256 148)" className="reel">
          <circle r="26" fill={T.paperDk} stroke={ink} strokeWidth="2.5"/>
          <circle r="10" fill={reel} stroke={ink} strokeWidth="2"/>
          <line x1="0" y1="-24" x2="0" y2="24" stroke={ink} strokeWidth="2"/>
          <line x1="-24" y1="0" x2="24" y2="0" stroke={ink} strokeWidth="2"/>
          <line x1="-17" y1="-17" x2="17" y2="17" stroke={ink} strokeWidth="2"/>
          <line x1="17" y1="-17" x2="-17" y2="17" stroke={ink} strokeWidth="2"/>
          <circle r="4" fill={T.plum} stroke={ink} strokeWidth="1.5"/>
        </g>
        {/* bottom edge detail */}
        <rect x="14" y="186" width="272" height="4" rx="2" fill={T.paperDk} stroke={ink} strokeWidth="1"/>
      </svg>
    </div>
  );
}

// ─── Action card ─────────────────────────────────────────────
function ActionCard({ href, title, subtitle, desc, cta, ctaColor, accentColor, icon }) {
  const [hov, setHov] = useState(false);
  return (
    <a href={href} style={{ textDecoration: 'none', display: 'flex' }}>
      <div
        onMouseEnter={() => setHov(true)}
        onMouseLeave={() => setHov(false)}
        style={{
          background: T.paper,
          border: `2.5px solid ${T.ink}`,
          boxShadow: hov ? `7px 7px 0 ${T.ink}` : `5px 5px 0 ${T.ink}`,
          transform: hov ? 'translate(-2px,-2px)' : 'none',
          transition: 'transform .08s, box-shadow .08s',
          display: 'flex', overflow: 'hidden',
          width: '100%',
        }}
      >
        {/* color tab */}
        <div style={{
          width: 8, flexShrink: 0,
          background: accentColor,
          borderRight: `2px solid ${T.ink}`,
        }} />
        {/* content */}
        <div style={{ padding: '8px 12px 10px', display: 'flex', flexDirection: 'column', gap: 5 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
            <span style={{ fontFamily: F.pixel, fontSize: 22, color: T.ink, lineHeight: 1, letterSpacing: 0.5 }}>{title}</span>
            <span style={{ fontFamily: F.chrome, fontSize: 10, color: T.inkSoft, textTransform: 'uppercase', letterSpacing: 0.5 }}>{subtitle}</span>
          </div>
          <div style={{ fontFamily: F.chrome, fontSize: 11, color: T.inkSoft, lineHeight: 1.4 }}>{desc}</div>
          <div style={{
            background: ctaColor, color: T.paper,
            border: `2px solid ${T.ink}`,
            boxShadow: hov ? 'none' : `3px 3px 0 ${T.ink}`,
            transform: hov ? 'translate(3px,3px)' : 'none',
            transition: 'transform .08s, box-shadow .08s',
            fontFamily: F.pixel, fontSize: 13, whiteSpace: 'nowrap',
            padding: '4px 10px 2px', display: 'inline-block', alignSelf: 'flex-start',
          }}>{cta} →</div>
        </div>
      </div>
    </a>
  );
}

// ─── Tape strip ───────────────────────────────────────────────
function TapeStrip({ h = 5 }) {
  const colors = [T.mustard, T.plum, T.seafoam, T.lavender, T.sage, T.forest, T.mustard, T.plum, T.seafoam, T.lavender, T.sage, T.forest];
  return (
    <div style={{ display: 'flex', width: '100%', flexShrink: 0 }}>
      {colors.map((c, i) => (
        <div key={i} style={{ flex: 1, height: h, background: c, borderRight: i < colors.length-1 ? `1px solid ${T.ink}` : 'none' }} />
      ))}
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────
function App() {
  return (
    <div style={{
      width: '100vw', height: '100vh',
      display: 'flex', flexDirection: 'column',
      background: T.ink, overflow: 'hidden',
    }}>
      {/* menubar */}
      <div style={{
        background: T.paper, borderBottom: `2.5px solid ${T.ink}`,
        display: 'flex', alignItems: 'center', gap: 20, padding: '5px 16px',
        fontFamily: F.pixel, fontSize: 18, lineHeight: 1, flexShrink: 0, zIndex: 10,
      }}>
        <span style={{ letterSpacing: 0.5 }}>
          <SchIcon name="cassette" size={16} color={T.plum} />{' '}CASSETTE
        </span>
        {['File','Tape','Help'].map(m => (
          <span key={m} style={{ opacity: 0.6, fontSize: 15, cursor: 'default' }}>{m}</span>
        ))}
        <div style={{ flex: 1 }} />
        <span style={{ fontFamily: F.chrome, fontSize: 11, opacity: 0.5 }}>
          {new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
        </span>
      </div>

      <TapeStrip />

      {/* split body */}
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>

        {/* ── LEFT hero panel ── */}
        <div style={{
          width: '50%', flexShrink: 0,
          background: T.plum,
          borderRight: `2.5px solid ${T.ink}`,
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          gap: 16, padding: '32px 30px',
          position: 'relative', overflow: 'hidden',
        }}>
          {/* dither bg */}
          <div style={{
            position: 'absolute', inset: 0, opacity: 0.08,
            backgroundImage: schDitherUrl(T.paper, T.plum, 3),
          }} />
          <SchFloaters density={3} seed={77} palette={['mustard', 'lavender', 'seafoam']} />

          {/* Big cassette */}
          <div style={{ position: 'relative', zIndex: 2 }}>
            <HeroCassette />
          </div>

          {/* App name */}
          <div style={{ position: 'relative', zIndex: 2, textAlign: 'center' }}>
            <div style={{
              fontFamily: F.pixel, fontSize: 52, color: T.paper,
              letterSpacing: 4, lineHeight: 1,
              textShadow: `4px 4px 0 ${T.ink}`,
            }}>CASSETTE</div>
            <div style={{
              fontFamily: F.chrome, fontSize: 12, color: T.mustard,
              letterSpacing: 3, textTransform: 'uppercase', marginTop: 8,
              opacity: 0.9,
            }}>make mixtapes · design j-cards</div>
          </div>

          {/* Bottom badge */}
          <div style={{
            position: 'relative', zIndex: 2,
            background: T.mustard, border: `2px solid ${T.ink}`,
            boxShadow: `4px 4px 0 ${T.ink}`,
            padding: '5px 14px 3px',
            fontFamily: F.pixel, fontSize: 16, color: T.ink,
            letterSpacing: 0.5, whiteSpace: 'nowrap',
          }}>no account needed — dive in<span className="cursor" style={{ whiteSpace: 'nowrap' }} /></div>
        </div>

        {/* ── RIGHT panel ── */}
        <div style={{
          flex: 1,
          background: T.seafoam,
          display: 'flex', flexDirection: 'column',
          justifyContent: 'center',
          padding: '16px 16px', gap: 0,
          position: 'relative', overflow: 'hidden', minHeight: 0,
        }}>
          <SchFloaters density={2} seed={13} palette={['plum', 'mustard', 'lavender']} />

          <div style={{ position: 'relative', zIndex: 2, display: 'flex', flexDirection: 'column', gap: 12 }}>

            {/* Section label */}
            <div style={{
              fontFamily: F.pixel, fontSize: 14, color: T.ink, opacity: 0.6, letterSpacing: 1,
            }}>CHOOSE YOUR ADVENTURE</div>

            {/* Cards */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <ActionCard
                href="Scherzo Mixtape.html"
                accentColor={T.mustard}
                title="Make a Tape"
                subtitle="Mixtape editor"
                desc="Arrange Side A & B, build your track list, and dial in the running time. No sign-in required."
                cta="Make"
                ctaColor={T.forest}
                icon="📼"
              />
              <ActionCard
                href="J-Card Generator.html"
                accentColor={T.lavender}
                title="Design a J-Card"
                subtitle="Print-ready card designer"
                desc="Upload cover art, style the spine and flaps, lay out your track list, and export PDF or PNG."
                cta="Design"
                ctaColor={T.plum}
                icon="🃏"
              />
            </div>
          </div>
        </div>
      </div>

      <TapeStrip />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
